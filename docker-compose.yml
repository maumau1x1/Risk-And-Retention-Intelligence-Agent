services:
  mcp-server:
    build:
      context: ./mcp-server
    ports:
      - "${MCP_SERVER_PORT:-8080}:8080"
    env_file:
      - ./mcp-server/.env
    environment:
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8080
      USE_MOCK_FABRIC_DATA: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/mcp')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
